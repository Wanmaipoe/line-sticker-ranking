name: Scrape LINE Sticker Rankings

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @libsql/client cheerio
      - name: Run scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node scripts/scrape-daily.mjs
      # The showcase grid the scraper reads has no creator name, so every new sticker lands
      # with author=NULL. Fill it from each product's detail page, a bounded batch per run,
      # so creator pages / Top Creators stay complete without slowing the hourly scrape.
      - name: Backfill creator names
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          BATCH: '400'
        run: node scripts/backfill-authors.mjs
